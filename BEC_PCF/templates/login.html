{% extends 'layout_ciudadano.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 relative z-10 glass-panel p-8 rounded-3xl border border-bec-accent/20 shadow-[0_0_40px_rgba(91,192,190,0.1)] backdrop-blur-xl">
    
    <!-- Decoración interna -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-bec-accent/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
    
    <div class="text-center mb-8 relative z-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-bec-base border border-bec-accent/30 mb-4 shadow-[0_0_15px_rgba(91,192,190,0.2)]">
            <i data-lucide="user-circle-2" class="w-8 h-8 text-bec-accent"></i>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Bienvenido de Nuevo</h1>
        <p class="text-sm text-slate-400 mt-2">Ingresa tus credenciales para administrar tus donaciones y voluntariados.</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="space-y-5 relative z-10">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <i data-lucide="mail" class="w-5 h-5 text-slate-500 group-focus-within:text-bec-accent transition-colors"></i>
                </div>
                <!-- Prellenado con la credencial Ciudadana -->
                <input type="email" name="correo" value="juan.perez@gmail.com" required
                    class="w-full pl-11 pr-4 py-3.5 bg-bec-base/50 border border-slate-700/80 rounded-xl focus:ring-1 focus:ring-bec-accent/50 focus:border-bec-accent text-sm text-white placeholder-slate-600 outline-none transition-all">
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="block text-sm font-medium text-slate-300">Contraseña</label>
                <a href="#" class="text-xs text-bec-accent hover:text-cyan-400 transition-colors">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <i data-lucide="lock" class="w-5 h-5 text-slate-500 group-focus-within:text-bec-accent transition-colors"></i>
                </div>
                <!-- Prellenado con la credencial Ciudadana -->
                <input type="password" name="password" value="ciudadano123" required
                    class="w-full pl-11 pr-4 py-3.5 bg-bec-base/50 border border-slate-700/80 rounded-xl focus:ring-1 focus:ring-bec-accent/50 focus:border-bec-accent text-sm text-white placeholder-slate-600 outline-none transition-all">
            </div>
        </div>

        <button type="submit" class="w-full py-3.5 mt-4 bg-bec-accent hover:bg-cyan-400 text-bec-dark font-bold rounded-xl transition-all shadow-[0_0_20px_rgba(91,192,190,0.3)] flex justify-center items-center">
            <span>Ingresar a Mi Cuenta</span>
            <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
        </button>
        
        <div class="text-center pt-4">
            <p class="text-sm text-slate-400">¿No tienes una cuenta? 
                <a href="#" class="text-bec-accent hover:text-cyan-400 font-medium transition-colors">Regístrate aquí</a>
            </p>
        </div>
    </form>
</div>
{% endblock %}
