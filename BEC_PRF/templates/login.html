<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Control de Acceso (PRF)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Elementos decorativos simulando dashboard de mostrador -->
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/always-grey.png')] opacity-10 blur-[1px]"></div>
    <div class="absolute top-0 w-full h-2 bg-emerald-500 blur-md"></div>
    <div class="absolute bottom-[-100px] left-[-100px] w-96 h-96 bg-emerald-600/20 rounded-full blur-[100px]"></div>

    <div class="relative w-full max-w-sm rounded-3xl overflow-hidden glass border border-slate-700/50 shadow-2xl bg-slate-800/80 backdrop-blur-xl">
        <!-- "Face ID" Holograma del Recepcionista (Visual Placeholder) -->
        <div class="flex justify-center pt-8 pb-2 mt-4 relative">
            <div class="absolute inset-0 top-6 left-0 right-0 h-40 flex items-center justify-center -z-10 blur-xl opacity-30 animate-pulse">
                <i data-lucide="scan-face" class="w-full h-full text-emerald-400"></i>
            </div>
            
            <div class="w-24 h-24 rounded-full border-2 border-emerald-500 p-1 relative shadow-[0_0_20px_rgba(16,185,129,0.5)] bg-slate-900 flex items-center justify-center shrink-0">
                <i data-lucide="user" class="w-12 h-12 text-slate-400"></i>
                <div class="absolute -bottom-1 -right-1 w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center border-2 border-slate-900">
                    <i data-lucide="shield-check" class="w-3 h-3 text-white"></i>
                </div>
            </div>
        </div>

        <div class="px-8 pb-8">
            <div class="text-center mb-6">
                <h1 class="text-lg font-bold uppercase tracking-widest text-emerald-400 mb-1">Recepción</h1>
                <p class="text-[11px] text-slate-400 font-medium tracking-wide">Acceso Operativo Bec_API</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-5 p-3 rounded-lg text-xs font-medium bg-rose-500/10 border border-rose-500/50 text-rose-400 text-center">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="at-sign" class="w-[18px] h-[18px] text-slate-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="email" name="correo" value="recepcion@yimpathi.org" required
                            placeholder="Credencial / ID de Usuario"
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-700/80 rounded-xl focus:ring-1 focus:ring-emerald-500/50 focus:border-emerald-500 text-sm text-white placeholder-slate-600 outline-none transition-all shadow-inner tracking-wide">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="key-round" class="w-[18px] h-[18px] text-slate-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="password" name="password" value="recep123" required
                            placeholder="Pin o Contraseña"
                            class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-700/80 rounded-xl focus:ring-1 focus:ring-emerald-500/50 focus:border-emerald-500 text-sm text-white placeholder-slate-600 outline-none transition-all shadow-inner tracking-widest">
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 mt-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold text-[13px] uppercase tracking-widest rounded-xl transition-all shadow-lg hover:shadow-emerald-500/25 flex justify-center items-center active:scale-[0.98]">
                    Iniciar Turno
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
